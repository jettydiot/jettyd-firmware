name: pwm_output
description: "LEDC PWM actuator with safety auto-off timer"
category: actuator
capabilities:
  - name: duty
    type: writable
    value_type: float
    unit: "%"
    description: "PWM duty cycle 0-100%"

config_schema:
  pin:
    type: int
    required: true
    description: "GPIO pin number"
  ledc_channel:
    type: int
    default: 0
    description: "LEDC channel (0-7)"
  freq_hz:
    type: int
    default: 1000
    description: "PWM frequency in Hz"
  max_on_duration:
    type: int
    default: 3600
    description: "Safety auto-off after N seconds (0 = no limit)"

esp_idf_components:
  - driver

compatible_targets:
  - esp32s3
  - esp32c3
  - esp32c6
