name: relay
description: "GPIO relay actuator with safety auto-off timer"
category: actuator
capabilities:
  - name: state
    type: switchable
    value_type: bool
    description: "Relay on/off state"

config_schema:
  pin:
    type: int
    required: true
    description: "GPIO pin number"
  active_high:
    type: bool
    default: true
    description: "true = HIGH activates relay"
  default_state:
    type: string
    enum: [on, off]
    default: off
  max_on_duration:
    type: int
    default: 1800
    description: "Safety auto-off after N seconds (0 = no limit)"

esp_idf_components:
  - driver

compatible_targets:
  - esp32s3
  - esp32c3
  - esp32c6
